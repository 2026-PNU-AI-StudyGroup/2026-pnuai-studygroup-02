<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 식재료 인식 및 영양 분석 시스템</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="container">
        
        <section id="sec-profile" class="app-section">
            <h2>👤 사용자 프로필 설정</h2>
            <div class="form-group">
                <label>성별 토글</label>
                <div id="gender-toggle" class="toggle-container">
                    <span class="toggle-placeholder">성별 선택 토글 (대기 중)</span>
                </div>
            </div>
            <div class="form-group">
                <label for="age-input">나이 입력</label>
                <input type="number" id="age-input" placeholder="나이를 입력하세요" min="1" max="120">
            </div>
        </section>

        <section id="sec-upload" class="app-section">
            <h2>📤 식재료 이미지 업로드</h2>
            <div class="upload-box">
                <input type="file" id="file-input" multiple accept="image/*">
                <p class="upload-tip">식재료 사진들을 여러 개 선택할 수 있습니다.</p>
            </div>
            <div id="preview-list" class="preview-container">
                <p class="placeholder-text">선택한 이미지 미리보기가 여기에 표시됩니다.</p>
            </div>
            <button id="recognize-btn" class="btn-primary">식재료 인식하기</button>
        </section>

        <section id="sec-result" class="app-section">
            <h2>🔍 식재료 인식 결과</h2>
            <div id="result-cards" class="cards-container">
                <p class="placeholder-text">인식된 식재료 카드 목록이 여기에 표시됩니다.</p>
            </div>
            <div class="btn-group">
                <button id="add-ingredient-btn" class="btn-secondary">식재료 직접 추가</button>
                <button id="analyze-btn" class="btn-primary">영양소 분석하기</button>
            </div>
        </section>

        <section id="sec-nutrition" class="app-section">
            <h2>📊 종합 영양 분석</h2>
            <div id="nutrition-bars" class="chart-container">
                <p class="placeholder-text">칼로리, 탄수화물, 단백질, 지방 등 영양소 그래프가 여기에 표시됩니다.</p>
            </div>
            <div id="deficient-cards" class="cards-container">
                <p class="placeholder-text">나이와 성별 대비 부족한 영양소 카드가 여기에 표시됩니다.</p>
            </div>
            <button id="recommend-btn" class="btn-primary">맞춤형 레시피 추천받기</button>
        </section>

        <section id="sec-recipe" class="app-section">
            <h2>🍳 추천 레시피</h2>
            <div id="recipe-cards" class="cards-container">
                <p class="placeholder-text">부족한 영양소를 채워줄 추천 레시피가 여기에 표시됩니다.</p>
            </div>
        </section>

    </main>

</body>
</html>
